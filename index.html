<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anita Comics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top-bar">
    <img id="title-img" src="" alt="Anita Comics logo" />
    <div class="top-bar-text">
      <span class="top-bar-title">Anita Comics</span>
      <span class="top-bar-subtitle">New comics coming soon</span>
    </div>
  </header>

  <main>
    <p id="comic-date"></p>

    <nav>
      <button id="btn-prev">&#8592; Prev</button>
      <button id="btn-random">Random</button>
      <button id="btn-next">Next &#8594;</button>
    </nav>

    <p id="empty-msg"></p>
    <img id="comic-img" src="" alt="Anita Comic" />
  </main>

  <script src="code.js"></script>
</body>
</html>
